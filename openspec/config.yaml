schema: spec-driven

context: |
  Project: Helios GCS — Open-source Ground Control Station for MAVLink UAVs
  Part of: Argus Platform (Helios = sky-facing sensor layer, Argus = ground-facing analytics)

  Tech Stack:
    - Framework: Flutter 3.x (Dart 3.x)
    - State Management: Riverpod 2.x
    - Database: DuckDB (embedded columnar OLAP via FFI)
    - Protocol: MAVLink v2 (code-generated Dart bindings)
    - Maps: flutter_map with OSM tiles + offline caching
    - Charts: fl_chart for telemetry time-series
    - Export: Apache Parquet (via DuckDB COPY TO)

  Architecture:
    - 4-layer: Presentation → State → Service → Data
    - Dual data path: real-time streams + analytical batch inserts
    - Offline-first, no cloud dependency
    - One DuckDB file per flight
    - Feature-based directory structure

  Conventions:
    - Apache 2.0 licence
    - Conventional commits
    - TDD London School (mock-first)
    - Domain-Driven Design with bounded contexts
    - Dark-first UI theme
    - Files under 500 lines
    - Typed interfaces for all public APIs

  Target Platforms:
    - Primary: Linux, macOS, Windows (desktop)
    - Secondary: Android tablet (field use)
    - Future: iOS

  Target Autopilots:
    - Primary: ArduPilot (ArduPlane, ArduCopter)
    - Secondary: PX4

rules:
  proposal:
    - Reference the helios-inital-spec.md for all architectural decisions
    - Include risk assessment for each major component
    - Identify gaps in the initial spec and propose solutions

  spec:
    - All interfaces must include Dart type signatures
    - Include error handling for every service method
    - Define concrete DuckDB SQL for all schema operations
    - Specify MAVLink message IDs and field mappings

  tasks:
    - Break tasks into chunks of max 4 hours
    - Each task must have clear acceptance criteria
    - Include test requirements for each task
    - Specify which layer(s) each task touches

  delta-spec:
    - Must include before/after state for schema changes
    - Include migration path for breaking changes

<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Helios GCS — open-source ground control station for MAVLink UAVs">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1929">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Helios GCS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Helios GCS</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading" style="
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a1929; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  ">
    <svg width="48" height="48" viewBox="0 0 48 48" style="margin-bottom: 24px; animation: pulse 2s ease-in-out infinite;">
      <circle cx="24" cy="24" r="20" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.3"/>
      <circle cx="24" cy="24" r="6" fill="#4fc3f7"/>
      <line x1="24" y1="4" x2="24" y2="14" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="34" x2="24" y2="44" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="24" x2="14" y2="24" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
      <line x1="34" y1="24" x2="44" y2="24" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div style="font-size: 18px; font-weight: 600; letter-spacing: 0.5px;">Helios GCS</div>
    <div id="loading-status" style="font-size: 13px; color: #90a4ae; margin-top: 8px;">Loading...</div>
  </div>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

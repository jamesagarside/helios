name: helios_gcs
description: "Open-source ground control station for MAVLink UAVs — Part of the Argus Platform"
publish_to: 'none'
version: 0.5.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Maps
  flutter_map: ^8.1.1
  flutter_map_tile_caching: ^10.1.1
  latlong2: ^0.9.1

  # Database (embedded analytics) — patched for macOS support
  duckdb_dart:
    path: packages/duckdb_dart_patched

  # Video streaming (RTSP/camera)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_linux: ^1.1.3
  media_kit_libs_windows_video: ^1.0.10

  # Charts (Analyse View)
  fl_chart: ^0.70.2

  # Storage & persistence
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Serial port (USB flight controller)
  flutter_libserialport: ^0.6.0

  # File picker (GeoJSON airspace import, image geotagging)
  file_picker: ^8.1.7
  # Image processing (EXIF GPS tag writing for geotagging)
  image: ^4.2.0

  # WebSocket (cross-platform — works on native and web)
  web_socket_channel: ^3.0.1

  # Web APIs (Web Serial, IndexedDB — only loaded on web builds)
  web: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  equatable: ^2.0.7

  # MAVLink (vendored — code-generated from MAVLink XML)
  dart_mavlink:
    path: packages/dart_mavlink
  xml: ^6.6.1
  gamepads: ^0.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

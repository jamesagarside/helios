name: helios_gcs
description: "Open-source ground control station for MAVLink UAVs — Part of the Argus Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts (Analyse View)
  fl_chart: ^0.70.2

  # Storage & persistence
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  equatable: ^2.0.7

  # MAVLink (vendored — code-generated from MAVLink XML)
  dart_mavlink:
    path: packages/dart_mavlink

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

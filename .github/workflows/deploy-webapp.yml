name: Deploy Web App

on:
  release:
    types: [published]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Add CNAME for custom domain
        run: echo 'app.heliosgcs.com' > build/web/CNAME

      - name: Add 404.html for SPA routing
        run: cp build/web/index.html build/web/404.html

      - name: Deploy to helios-app repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.WEBAPP_DEPLOY_KEY }}
          external_repository: jamesagarside/helios-app
          publish_branch: gh-pages
          publish_dir: build/web
          cname: app.heliosgcs.com

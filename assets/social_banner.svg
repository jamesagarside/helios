<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0D1117"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161B22" stroke-width="0.5"/>
    </pattern>
    <!-- Radial fade for the icon glow -->
    <radialGradient id="glow" cx="380" cy="320" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Horizontal fade for grid -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="1280" height="640" fill="url(#gridFade)"/>
    </mask>
  </defs>

  <rect width="1280" height="640" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Glow behind icon -->
  <circle cx="380" cy="320" r="240" fill="url(#glow)"/>

  <!-- Helios icon (scaled from 100x100 design, centred at 380,320) -->
  <g transform="translate(230, 170) scale(3)">
    <!-- Outer sight-line rays -->
    <line x1="50" y1="10" x2="50" y2="25" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="50" y1="75" x2="50" y2="90" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="10" y1="50" x2="25" y2="50" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="75" y1="50" x2="90" y2="50" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="21" y1="21" x2="32" y2="32" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="68" y1="68" x2="79" y2="79" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="79" y1="21" x2="68" y2="32" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="32" y1="68" x2="21" y2="79" stroke="#58A6FF" stroke-width="0.8" opacity="0.4"/>

    <!-- Corona connections -->
    <line x1="50" y1="28" x2="35" y2="38" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="50" y1="28" x2="65" y2="38" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="35" y1="38" x2="28" y2="50" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="65" y1="38" x2="72" y2="50" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="28" y1="50" x2="35" y2="62" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="72" y1="50" x2="65" y2="62" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="35" y1="62" x2="50" y2="72" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="65" y1="62" x2="50" y2="72" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <!-- Cross connections -->
    <line x1="35" y1="38" x2="65" y2="38" stroke="#58A6FF" stroke-width="0.5" opacity="0.35"/>
    <line x1="35" y1="62" x2="65" y2="62" stroke="#58A6FF" stroke-width="0.5" opacity="0.35"/>
    <line x1="28" y1="50" x2="72" y2="50" stroke="#58A6FF" stroke-width="0.5" opacity="0.35"/>
    <line x1="35" y1="38" x2="65" y2="62" stroke="#58A6FF" stroke-width="0.5" opacity="0.25"/>
    <line x1="65" y1="38" x2="35" y2="62" stroke="#58A6FF" stroke-width="0.5" opacity="0.25"/>

    <!-- Ray tip nodes -->
    <circle cx="50" cy="10" r="2.4" fill="#58A6FF" opacity="0.8"/>
    <circle cx="50" cy="90" r="2.4" fill="#58A6FF" opacity="0.8"/>
    <circle cx="10" cy="50" r="2.4" fill="#58A6FF" opacity="0.8"/>
    <circle cx="90" cy="50" r="2.4" fill="#58A6FF" opacity="0.8"/>
    <circle cx="21" cy="21" r="2" fill="#58A6FF" opacity="0.7"/>
    <circle cx="79" cy="79" r="2" fill="#58A6FF" opacity="0.7"/>
    <circle cx="79" cy="21" r="2" fill="#58A6FF" opacity="0.7"/>
    <circle cx="21" cy="79" r="2" fill="#58A6FF" opacity="0.7"/>

    <!-- Corona nodes -->
    <circle cx="50" cy="28" r="3.2" fill="#58A6FF" opacity="0.9"/>
    <circle cx="50" cy="72" r="3.2" fill="#58A6FF" opacity="0.9"/>
    <circle cx="28" cy="50" r="3.2" fill="#58A6FF" opacity="0.9"/>
    <circle cx="72" cy="50" r="3.2" fill="#58A6FF" opacity="0.9"/>
    <circle cx="35" cy="38" r="3" fill="#58A6FF" opacity="0.9"/>
    <circle cx="65" cy="38" r="3" fill="#58A6FF" opacity="0.9"/>
    <circle cx="35" cy="62" r="3" fill="#58A6FF" opacity="0.9"/>
    <circle cx="65" cy="62" r="3" fill="#58A6FF" opacity="0.9"/>

    <!-- Centre core -->
    <circle cx="50" cy="50" r="8" fill="#58A6FF" opacity="0.15"/>
    <circle cx="50" cy="50" r="5.6" fill="#58A6FF" opacity="1"/>
  </g>

  <!-- Text group — right of icon -->
  <!-- "HELIOS" main title -->
  <text x="570" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="80" font-weight="700" letter-spacing="6" fill="#E6EDF3">HELIOS</text>

  <!-- "GCS" suffix in accent -->
  <text x="570" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="600" letter-spacing="3" fill="#58A6FF">GCS</text>

  <!-- Tagline -->
  <text x="570" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8B949E">Open-source ground control for UAVs</text>

  <!-- Border frame -->
  <rect x="1" y="1" width="1278" height="638" rx="4" stroke="#30363D" stroke-width="1" fill="none"/>
</svg>
